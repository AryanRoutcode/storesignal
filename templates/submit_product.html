<!DOCTYPE html>
<html>

<head>

    <title>Submit Product</title>

    <style>

        body{

            font-family: Arial;

            background:#f4f6f9;

            padding:40px;

        }

        .form-container{

            width:60%;

            margin:auto;

            background:white;

            padding:40px;

            border-radius:15px;

            box-shadow:0px 0px 15px rgba(0,0,0,0.1);

        }

        input, textarea{

            width:100%;

            padding:12px;

            margin-top:10px;

            margin-bottom:20px;

            border-radius:8px;

            border:1px solid #ccc;

        }

        button{

            background:#2196F3;

            color:white;

            border:none;

            padding:12px 25px;

            border-radius:8px;

            cursor:pointer;

            font-size:16px;

        }

        h1{

            text-align:center;

            margin-bottom:30px;

        }

    </style>

</head>

<body>

    <div class="form-container">

        <h1>Merchant Product Submission</h1>

        <form method="POST">

            <label>Product Title</label>

            <input
                type="text"
                name="title"
                required
            >

            <label>Description</label>

            <textarea
                name="description"
                rows="8"
                required
            ></textarea>

            <label>Price</label>

            <input
                type="number"
                name="price"
                required
            >

            <button type="submit">

                Submit Product

            </button>

        </form>

    </div>

</body>

</html>
